<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESCEN - Test Microsoft 365</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Écran d'accueil -->
    <section id="screen1" class="screen active">
        <h1>Testez votre niveau Microsoft 365</h1>
        <button id="btnTest">Faire le test</button>
        <button id="btnFormation">Voir la formation</button>
    </section>

    <!-- Écran quiz -->
    <section class="screen" id="screen2">
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <h2 id="question">Question ici</h2>
        <div id="answers"></div>
        <button id="nextBtn" disabled>Suivant</button>
    </section>

    <!-- Écran formulaire -->
   <section class="screen" id="screen3">
    <h2>Formulaire</h2>
    <p>Pour recevoir vos suggestions personnalisées et votre score, remplissez ce formulaire :</p>
    <form id="contactForm">
        <input type="text" id="name" placeholder="Nom" required>
        <input type="text" id="surname" placeholder="Prénom" required>
        <input type="email" id="email" placeholder="Email" required>
        <button type="submit" class="submit-btn">Continuer le quiz</button>
    </form>
</section>

    <!-- Écran formation -->
    <section class="screen" id="screen4">
        <h2>Formation Microsoft 365</h2>
        <p>Découvrez nos trois niveaux de certification...</p>
    </section>

    <script src="script.js"></script>
</body>
</html>
